name: bev-uncertainty
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  - pytorch::pytorch=2.2.2
  - pytorch::torchvision=0.17.2
  - pytorch::torchaudio=2.2.2

  # System libs
  - numpy=1.26
  - scipy
  - matplotlib
  - conda-forge::opencv

  # Pip packages
  - pip:
    - ultralytics>=8.0
    - nuscenes-devkit
    - pyquaternion
    - filterpy
    - tqdm
    - wandb
