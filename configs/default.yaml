# default.yaml
# Default configuration for training, Monte Carlo inference, BEV lifting, and evaluation.

mc_dropout:
  T: 20
  block_size: 5
  drop_prob: 0.1

train:
  epochs: 100
  patience: 30
  batch: 8
  imgsz: 640
  device: cpu
  optimizer: AdamW
  lr0: 0.0005

checkpoint:
  export_path: results/checkpoints/model_final.pt

bev:
  x_min: 0.0
  x_max: 50.0
  y_min: -25.0
  y_max: 25.0
  cell_size: 0.25
  grid_height: 200
  grid_width: 200

camera:
  fx: 1266.417
  fy: 1266.417
  cx: 816.0
  cy: 491.0

lift_3d:
  gt_depth_mode: true
  lidar_mode: false
  depth_robust_method: "median"
  depth_variance_threshold: 1.0

uncertainty:
  association_iou_thresh: 0.5
  aggregation_nms_thresh: 0.5

evaluation:
  calibration_enabled: true
  sanity_checks_enabled: true
